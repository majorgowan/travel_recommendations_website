<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marks' Travel Recommendations</title>
    <link rel="stylesheet" href="travel_recommendation.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<nav>
    <ul>
        <li class="mylogo">
            <img height="70"
                 src="./istockphoto-1322629785-612x612.png" alt="MarksTravel">Marks' Travel Recommendations</li>
        <li><a href="./travel_recommendation.html" id="home">Home </a></li>
        <li><a href="./about_us.html" id="about">About Us</a></li>
        <li><a href="./contact_us.html" id="contact">Contact Us</a></li>
    </ul>
</nav>
<div class="container">
    <div class="social">
        <a href="#"><i class="fab fa-x-twitter"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
    </div>
    <div class="blurb contactblurb">
        <h2>
            Contact Us
        </h2>
        <p>
            What can we do you for?
        </p>
    </div>
    <div class="contactform">
        <form action="#">
            <div class="formrow">
                <label for="name">Name: </label>
                <input type="text" name="name" id="name" placeholder="Enter your name">
            </div>
            <div class="formrow">
                <label for="email">Email: </label>
                <input type="email" name="email" id="email" placeholder="Enter your Email">
            </div>
            <label for="message">Message: </label>
            <textarea name="message" id="message" cols="30" rows="10"></textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
